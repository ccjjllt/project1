run:
  name: ablation
  output_dir: outputs/ablation
  seed: 42
  device: auto

dataset:
  type: imdb
  train_size: 20000
  val_size: 5000
  test_split: test
  lang: en

text:
  max_len: 256
  min_freq: 5

train:
  batch_size: 64
  epochs: 5
  lr: 0.001

model:              # ✅ 必须有
  embed_dim: 128
  hidden_dim: 128
  num_layers: 1
  bidirectional: true
  dropout: 0.5
  attn_dim: 128

# Grid of experiments. Each item becomes one run.
# You can extend it with more knobs (dropout, bidirectional, max_len, min_freq...)
experiments:
  - name: bilstm_last
    model_type: bilstm_pool
    pooling: last
  - name: bilstm_mean
    model_type: bilstm_pool
    pooling: mean
  - name: bilstm_max
    model_type: bilstm_pool
    pooling: max
  - name: bilstm_attn
    model_type: bilstm_attn
    attn_dim: 128
