run:
  name: bilstm_attention
  output_dir: outputs/bilstm_attention
  seed: 42
  device: auto

dataset:
  type: imdb
  train_size: 20000
  val_size: 5000
  test_split: test
  lang: en

text:
  max_len: 256
  min_freq: 5

train:
  batch_size: 64
  epochs: 5
  lr: 0.001

model:
  embed_dim: 128
  hidden_dim: 128
  num_layers: 1
  bidirectional: true
  dropout: 0.5
  attn_dim: 128
