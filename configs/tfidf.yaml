run:
  name: tfidf_lr
  output_dir: outputs/tfidf_lr
  seed: 42

dataset:
  # Use your own CSV splits produced by `make build-data`
  type: csv_splits
  split_dir: data/splits
  text_col: text
  label_col: label
  # Choose tokenizer:
  # - zh: jieba cut + join with spaces
  # - en: regex word tokenizer
  lang: zh

tfidf:
  max_features: 20000
  ngram_range: [1, 2]
  min_df: 3
  max_df: 0.9

model:
  # Logistic Regression baseline
  C: 1.0
  max_iter: 2000
